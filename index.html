<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cart Calc">
<meta name="theme-color" content="#1a1a18">
<title>Cart Calc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0d;
    --surface: #0a43bf;
    --surface2: #242420;
    --border: #2e2e2a;
    --accent: #c8f04e;
    --accent-dim: #9ab839;
    --text: #f0ede6;
    --text-muted: #7a776e;
    --text-faint: #3d3d38;
    --red: #ff5f57;
    --receipt-bg: #1e1e1b;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* HEADER */
  .header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }

  .header-title {
    font-family: 'Syne Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .item-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .clear-btn:active { background: var(--surface2); color: var(--red); border-color: var(--red); }

  /* INPUT ZONE */
  .input-zone {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .price-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
  }

  .price-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }

  .dollar-sign {
    position: absolute;
    left: 14px;
    font-size: 20px;
    color: var(--accent);
    font-family: 'Syne Mono', monospace;
    pointer-events: none;
    font-weight: 400;
  }

  .price-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne Mono', monospace;
    font-size: 28px;
    padding: 14px 16px 14px 38px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    caret-color: var(--accent);
  }
  .price-input:focus { border-color: var(--accent); }
  .price-input::placeholder { color: var(--text-faint); }

  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    box-shadow: 0 4px 20px rgba(200,240,78,0.2);
  }
  .add-btn:active { transform: scale(0.93); background: var(--accent-dim); }
  .add-btn svg { color: #0f0f0d; }

  .label-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .label-input:focus { border-color: var(--border); }
  .label-input::placeholder { color: var(--text-faint); }

  /* RECEIPT / ITEM LIST */
  .receipt-wrap {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--receipt-bg);
  }

  .receipt-header {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px 6px;
    border-bottom: 1px dashed var(--border);
  }

  .receipt-col-label {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .item-list {
    padding: 4px 0;
  }

  .item-row {
    display: flex;
    align-items: center;
    padding: 11px 20px;
    border-bottom: 1px solid var(--text-faint);
    gap: 10px;
    animation: slideIn 0.2s ease;
    transition: background 0.15s;
  }
  .item-row:active { background: var(--surface2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .item-num {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    width: 18px;
    flex-shrink: 0;
  }

  .item-label {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-price {
    font-family: 'Syne Mono', monospace;
    font-size: 15px;
    color: var(--text);
    flex-shrink: 0;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }
  .remove-btn:active { color: var(--red); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    gap: 10px;
  }
  .empty-icon { font-size: 40px; opacity: 0.25; }
  .empty-text { font-size: 13px; color: var(--text-faint); letter-spacing: 0.04em; }

  /* TOTALS PANEL */
  .totals-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
  }

  .totals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
  }

  .totals-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .totals-value {
    font-family: 'Syne Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .totals-row.fee .totals-label { color: var(--accent-dim); }
  .totals-row.fee .totals-value { color: var(--accent-dim); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }

  .tax-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    gap: 12px;
  }

  .tax-label {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .tax-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tax-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne Mono', monospace;
    font-size: 14px;
    padding: 5px 8px;
    width: 64px;
    text-align: right;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .tax-input:focus { border-color: var(--accent); }

  .tax-pct { font-family: 'Syne Mono', monospace; font-size: 13px; color: var(--text-muted); }
  .tax-amount { font-family: 'Syne Mono', monospace; font-size: 14px; color: var(--text); }

  .grand-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 10px;
    padding: 12px 14px;
    background: var(--accent);
    border-radius: 12px;
  }

  .grand-label {
    font-size: 12px;
    font-weight: 600;
    color: #0f0f0d;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .grand-value {
    font-family: 'Syne Mono', monospace;
    font-size: 26px;
    color: #0f0f0d;
    letter-spacing: -1px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">CART CALC</span>
  <span class="item-count" id="itemCount">0 items</span>
  <button class="clear-btn" onclick="clearAll()">CLEAR</button>
</div>

<div class="input-zone">
  <div class="price-row">
    <div class="price-wrap">
      <span class="dollar-sign">$</span>
      <input
        class="price-input"
        id="priceInput"
        type="number"
        inputmode="decimal"
        placeholder="0.00"
        step="0.01"
        min="0"
        enterkeyhint="done"
        autocomplete="off"
      >
    </div>
    <button class="add-btn" onclick="addItem()">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
  <input
    class="label-input"
    id="labelInput"
    type="text"
    placeholder="Item name (optional)"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="words"
    enterkeyhint="done"
  >
</div>

<div class="receipt-wrap">
  <div class="receipt-header">
    <span class="receipt-col-label">#&nbsp;&nbsp;ITEM</span>
    <span class="receipt-col-label">PRICE</span>
  </div>
  <div class="item-list" id="itemList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🛒</div>
      <div class="empty-text">ADD YOUR FIRST ITEM ABOVE</div>
    </div>
  </div>
</div>

<div class="totals-panel">
  <div class="totals-row">
    <span class="totals-label">Subtotal</span>
    <span class="totals-value" id="subtotal">$0.00</span>
  </div>
  <div class="totals-row fee">
    <span class="totals-label">Cost-plus fee (10%)</span>
    <span class="totals-value" id="feeAmount">$0.00</span>
  </div>
  <div class="divider"></div>
  <div class="tax-row">
    <span class="tax-label">Sales tax</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="tax-input-wrap">
        <input class="tax-input" id="taxRate" type="number" inputmode="decimal" value="8.25" min="0" max="30" step="0.01">
        <span class="tax-pct">%</span>
      </div>
      <span class="tax-amount" id="taxAmount">$0.00</span>
    </div>
  </div>
  <div class="grand-total-row">
    <span class="grand-label">Grand Total</span>
    <span class="grand-value" id="grandTotal">$0.00</span>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('cartItems') || '[]');
  let taxRate = parseFloat(localStorage.getItem('taxRate') || '8.25');

  const priceInput = document.getElementById('priceInput');
  const labelInput = document.getElementById('labelInput');
  const taxRateInput = document.getElementById('taxRate');

  taxRateInput.value = taxRate;

  function fmt(n) {
    return '$' + n.toFixed(2);
  }

  function save() {
    localStorage.setItem('cartItems', JSON.stringify(items));
    localStorage.setItem('taxRate', taxRate);
  }

  function addItem() {
    const price = parseFloat(priceInput.value);
    if (isNaN(price) || price <= 0) {
      priceInput.focus();
      priceInput.style.borderColor = 'var(--red)';
      setTimeout(() => priceInput.style.borderColor = '', 600);
      return;
    }
    const label = labelInput.value.trim() || 'Item';
    items.push({ id: Date.now(), label, price });
    priceInput.value = '';
    labelInput.value = '';
    priceInput.blur();
    labelInput.blur();
    save();
    render();
  }

  function removeItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (items.length === 0) return;
    if (confirm('Clear all items?')) {
      items = [];
      save();
      render();
    }
  }

  function render() {
    const list = document.getElementById('itemList');
    const empty = document.getElementById('emptyState');

    // Count
    document.getElementById('itemCount').textContent =
      items.length === 0 ? '0 items' : `${items.length} item${items.length !== 1 ? 's' : ''}`;

    if (items.length === 0) {
      list.innerHTML = '';
      list.appendChild(empty);
      calcTotals(0, true);
      return;
    }

    list.innerHTML = '';
    items.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <span class="item-num">${idx + 1}</span>
        <span class="item-label">${escHtml(item.label)}</span>
        <span class="item-price">${fmt(item.price)}</span>
        <button class="remove-btn" onclick="removeItem(${item.id})" aria-label="Remove">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      `;
      list.appendChild(row);
    });

    const subtotal = items.reduce((s, i) => s + i.price, 0);
    calcTotals(subtotal);
  }

  function calcTotals(subtotal, empty = false) {
    if (empty) {
      document.getElementById('subtotal').textContent = '—';
      document.getElementById('feeAmount').textContent = '—';
      document.getElementById('taxAmount').textContent = '—';
      document.getElementById('grandTotal').textContent = '—';
      return;
    }
    const fee = subtotal * 0.10;
    const afterFee = subtotal + fee;
    const tax = afterFee * (taxRate / 100);
    const grand = afterFee + tax;

    document.getElementById('subtotal').textContent = fmt(subtotal);
    document.getElementById('feeAmount').textContent = fmt(fee);
    document.getElementById('taxAmount').textContent = fmt(tax);
    document.getElementById('grandTotal').textContent = fmt(grand);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Tax rate change
  taxRateInput.addEventListener('input', () => {
    const v = parseFloat(taxRateInput.value);
    taxRate = isNaN(v) ? 0 : Math.max(0, Math.min(30, v));
    save();
    const subtotal = items.reduce((s, i) => s + i.price, 0);
    calcTotals(subtotal);
  });

  // Enter key on price
  priceInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      labelInput.focus();
    }
  });

  // Enter on label
  labelInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addItem();
    }
  });

  // Scroll to bottom when new item added to list
  function scrollToBottom() {
    const wrap = document.querySelector('.receipt-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  }

  const origAdd = addItem;

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    const sw = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => clients.claim());
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
      });
    `;
    const blob = new Blob([sw], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl);
  }

  render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cart Calc">
<meta name="theme-color" content="#03020d">
<title>Cart Calc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #03020d;
    --surface: #07061a;
    --surface2: #0d0c26;
    --border: #1a1060;
    --border-glow: #2a1d8f;
    --cyan: #00f0ff;
    --cyan-dim: #00aacc;
    --pink: #ff1f8e;
    --pink-dim: #cc1070;
    --purple: #9b00ff;
    --purple-dim: #6600bb;
    --text: #e0f0ff;
    --text-muted: #5a7090;
    --text-faint: #1e2a40;
    --red: #ff3355;
    --receipt-bg: #050412;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    background-image:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* HEADER */
  .header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: linear-gradient(180deg, #0a0820 0%, var(--bg) 100%);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent);
    opacity: 0.6;
  }

  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 900;
    color: var(--cyan);
    letter-spacing: 0.15em;
    text-shadow: 0 0 12px rgba(0,240,255,0.8), 0 0 30px rgba(0,240,255,0.3);
  }

  .item-count {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.1em;
    font-family: 'Share Tech Mono', monospace;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border-glow);
    color: var(--text-muted);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  .clear-btn:active {
    background: rgba(255,31,142,0.1);
    color: var(--pink);
    border-color: var(--pink);
    box-shadow: 0 0 10px rgba(255,31,142,0.4);
  }

  /* INPUT ZONE */
  .input-zone {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .price-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
  }

  .price-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }

  .dollar-sign {
    position: absolute;
    left: 14px;
    font-size: 20px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    pointer-events: none;
    font-weight: 400;
    text-shadow: 0 0 8px rgba(0,240,255,0.7);
  }

  .price-input {
    width: 100%;
    background: rgba(0,240,255,0.03);
    border: 1.5px solid var(--border-glow);
    border-radius: 8px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    padding: 14px 16px 14px 38px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    caret-color: var(--cyan);
    text-shadow: 0 0 8px rgba(0,240,255,0.5);
  }
  .price-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 16px rgba(0,240,255,0.2), inset 0 0 10px rgba(0,240,255,0.05);
  }
  .price-input::placeholder { color: var(--text-faint); text-shadow: none; }

  .add-btn {
    background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
    border: none;
    border-radius: 8px;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    box-shadow: 0 0 20px rgba(255,31,142,0.4), 0 0 40px rgba(155,0,255,0.2);
  }
  .add-btn:active { transform: scale(0.93); opacity: 0.85; }
  .add-btn svg { color: #fff; filter: drop-shadow(0 0 4px rgba(255,255,255,0.6)); }

  /* KEYBOARD TOOLBAR */
  .kb-toolbar {
    position: fixed;
    bottom: -60px;
    left: 0;
    right: 0;
    height: 52px;
    background: #0a0820;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 16px;
    z-index: 999;
    transition: bottom 0.25s ease;
  }
  .kb-toolbar::before {
    content: '';
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
    opacity: 0.5;
  }
  .kb-toolbar.visible { bottom: 0; }

  .kb-add-btn {
    background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 10px 22px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    box-shadow: 0 0 14px rgba(255,31,142,0.5);
    text-shadow: 0 0 8px rgba(255,255,255,0.5);
  }
  .kb-add-btn:active { opacity: 0.8; transform: scale(0.96); }

  .label-input {
    width: 100%;
    background: rgba(155,0,255,0.04);
    border: 1.5px solid var(--border-glow);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .label-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 12px rgba(155,0,255,0.2);
  }
  .label-input::placeholder { color: var(--text-faint); }

  /* RECEIPT / ITEM LIST */
  .receipt-wrap {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--receipt-bg);
    background-image:
      linear-gradient(rgba(0,240,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.02) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  .receipt-header {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px 6px;
    border-bottom: 1px dashed var(--border-glow);
  }

  .receipt-col-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .item-list {
    padding: 4px 0;
  }

  .item-row {
    display: flex;
    align-items: center;
    padding: 11px 20px;
    border-bottom: 1px solid rgba(26,16,96,0.8);
    gap: 10px;
    animation: slideIn 0.2s ease;
    transition: background 0.15s;
  }
  .item-row:active { background: rgba(0,240,255,0.04); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .item-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    width: 18px;
    flex-shrink: 0;
  }

  .item-label {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-price {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    color: var(--cyan);
    flex-shrink: 0;
    text-shadow: 0 0 6px rgba(0,240,255,0.4);
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
    transition: color 0.15s, filter 0.15s;
    display: flex;
    align-items: center;
  }
  .remove-btn:active {
    color: var(--pink);
    filter: drop-shadow(0 0 4px rgba(255,31,142,0.8));
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    gap: 10px;
  }
  .empty-icon { font-size: 40px; opacity: 0.2; }
  .empty-text {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    font-family: 'Orbitron', monospace;
  }

  /* TOTALS PANEL */
  .totals-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
    position: relative;
  }
  .totals-panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple), var(--pink), transparent);
    opacity: 0.5;
  }

  .totals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
  }

  .totals-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  .totals-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .totals-row.fee .totals-label { color: var(--purple-dim); }
  .totals-row.fee .totals-value {
    color: var(--purple);
    text-shadow: 0 0 8px rgba(155,0,255,0.5);
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    margin: 10px 0;
  }

  .tax-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    gap: 12px;
  }

  .tax-label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .tax-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tax-input {
    background: rgba(0,240,255,0.03);
    border: 1px solid var(--border-glow);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 5px 8px;
    width: 64px;
    text-align: right;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .tax-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 8px rgba(0,240,255,0.2);
  }

  .tax-pct { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text-muted); }
  .tax-amount { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--text); }

  .grand-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 10px;
    padding: 13px 16px;
    background: linear-gradient(135deg, rgba(255,31,142,0.15) 0%, rgba(155,0,255,0.15) 100%);
    border: 1px solid var(--pink);
    border-radius: 8px;
    box-shadow: 0 0 24px rgba(255,31,142,0.2), 0 0 48px rgba(155,0,255,0.1), inset 0 0 20px rgba(255,31,142,0.05);
    position: relative;
    overflow: hidden;
  }
  .grand-total-row::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  }

  .grand-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--pink);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,31,142,0.7);
  }

  .grand-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: #fff;
    letter-spacing: -0.5px;
    text-shadow: 0 0 16px rgba(255,31,142,0.8), 0 0 32px rgba(155,0,255,0.5);
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">CART CALC</span>
  <span class="item-count" id="itemCount">0 items</span>
  <button class="clear-btn" onclick="clearAll()">CLEAR</button>
</div>

<div class="input-zone">
  <div class="price-row">
    <div class="price-wrap">
      <span class="dollar-sign">$</span>
      <input
        class="price-input"
        id="priceInput"
        type="number"
        inputmode="decimal"
        placeholder="0.00"
        step="0.01"
        min="0"
        enterkeyhint="done"
        autocomplete="off"
      >
    </div>
    <button class="add-btn" onclick="addItem()">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
  <input
    class="label-input"
    id="labelInput"
    type="text"
    placeholder="Item name (optional)"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="words"
    enterkeyhint="done"
  >
</div>

<div class="receipt-wrap">
  <div class="receipt-header">
    <span class="receipt-col-label">#&nbsp;&nbsp;ITEM</span>
    <span class="receipt-col-label">PRICE</span>
  </div>
  <div class="item-list" id="itemList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🛒</div>
      <div class="empty-text">ADD YOUR FIRST ITEM ABOVE</div>
    </div>
  </div>
</div>

<div class="totals-panel">
  <div class="totals-row">
    <span class="totals-label">Subtotal</span>
    <span class="totals-value" id="subtotal">$0.00</span>
  </div>
  <div class="totals-row fee">
    <span class="totals-label">Cost-plus fee (10%)</span>
    <span class="totals-value" id="feeAmount">$0.00</span>
  </div>
  <div class="divider"></div>
  <div class="tax-row">
    <span class="tax-label">Sales tax</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="tax-input-wrap">
        <input class="tax-input" id="taxRate" type="number" inputmode="decimal" value="8.25" min="0" max="30" step="0.01">
        <span class="tax-pct">%</span>
      </div>
      <span class="tax-amount" id="taxAmount">$0.00</span>
    </div>
  </div>
  <div class="grand-total-row">
    <span class="grand-label">Grand Total</span>
    <span class="grand-value" id="grandTotal">$0.00</span>
  </div>
</div>

<div class="kb-toolbar" id="kbToolbar">
  <button class="kb-add-btn" id="kbAddBtn">Add Item</button>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('cartItems') || '[]');
  let taxRate = parseFloat(localStorage.getItem('taxRate') || '8.25');

  const priceInput = document.getElementById('priceInput');
  const labelInput = document.getElementById('labelInput');
  const taxRateInput = document.getElementById('taxRate');

  taxRateInput.value = taxRate;

  function fmt(n) {
    return '$' + n.toFixed(2);
  }

  function save() {
    localStorage.setItem('cartItems', JSON.stringify(items));
    localStorage.setItem('taxRate', taxRate);
  }

  function addItem() {
    const price = parseFloat(priceInput.value);
    if (isNaN(price) || price <= 0) {
      priceInput.focus();
      priceInput.style.borderColor = 'var(--red)';
      setTimeout(() => priceInput.style.borderColor = '', 600);
      return;
    }
    const label = labelInput.value.trim() || 'Item';
    items.push({ id: Date.now(), label, price });
    priceInput.value = '';
    labelInput.value = '';
    priceInput.blur();
    labelInput.blur();
    save();
    render();
  }

  function removeItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (items.length === 0) return;
    if (confirm('Clear all items?')) {
      items = [];
      save();
      render();
    }
  }

  function render() {
    const list = document.getElementById('itemList');
    const empty = document.getElementById('emptyState');

    // Count
    document.getElementById('itemCount').textContent =
      items.length === 0 ? '0 items' : `${items.length} item${items.length !== 1 ? 's' : ''}`;

    if (items.length === 0) {
      list.innerHTML = '';
      list.appendChild(empty);
      calcTotals(0, true);
      return;
    }

    list.innerHTML = '';
    items.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <span class="item-num">${idx + 1}</span>
        <span class="item-label">${escHtml(item.label)}</span>
        <span class="item-price">${fmt(item.price)}</span>
        <button class="remove-btn" onclick="removeItem(${item.id})" aria-label="Remove">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      `;
      list.appendChild(row);
    });

    const subtotal = items.reduce((s, i) => s + i.price, 0);
    calcTotals(subtotal);
  }

  function calcTotals(subtotal, empty = false) {
    if (empty) {
      document.getElementById('subtotal').textContent = '—';
      document.getElementById('feeAmount').textContent = '—';
      document.getElementById('taxAmount').textContent = '—';
      document.getElementById('grandTotal').textContent = '—';
      return;
    }
    const fee = subtotal * 0.10;
    const afterFee = subtotal + fee;
    const tax = afterFee * (taxRate / 100);
    const grand = afterFee + tax;

    document.getElementById('subtotal').textContent = fmt(subtotal);
    document.getElementById('feeAmount').textContent = fmt(fee);
    document.getElementById('taxAmount').textContent = fmt(tax);
    document.getElementById('grandTotal').textContent = fmt(grand);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Tax rate change
  taxRateInput.addEventListener('input', () => {
    const v = parseFloat(taxRateInput.value);
    taxRate = isNaN(v) ? 0 : Math.max(0, Math.min(30, v));
    save();
    const subtotal = items.reduce((s, i) => s + i.price, 0);
    calcTotals(subtotal);
  });

  // Keyboard toolbar
  const kbToolbar = document.getElementById('kbToolbar');
  const kbAddBtn = document.getElementById('kbAddBtn');

  function showToolbar() { kbToolbar.classList.add('visible'); }
  function hideToolbar() { kbToolbar.classList.remove('visible'); }

  priceInput.addEventListener('focus', showToolbar);
  labelInput.addEventListener('focus', showToolbar);

  // Hide after a short delay to allow tap on toolbar button to register first
  priceInput.addEventListener('blur', () => setTimeout(hideToolbar, 150));
  labelInput.addEventListener('blur', () => setTimeout(hideToolbar, 150));

  kbAddBtn.addEventListener('mousedown', e => e.preventDefault()); // prevent blur before tap
  kbAddBtn.addEventListener('click', addItem);

  // Enter key on price
  priceInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      labelInput.focus();
    }
  });

  // Enter on label
  labelInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addItem();
    }
  });

  // Scroll to bottom when new item added to list
  function scrollToBottom() {
    const wrap = document.querySelector('.receipt-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  }

  const origAdd = addItem;

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    const sw = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => clients.claim());
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
      });
    `;
    const blob = new Blob([sw], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl);
  }

  render();
</script>
</body>
</html>
